<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" />
      <button type="submit">Enviar</button>
    </form>
    <script>
      document
        .querySelector("form")
        .addEventListener("submit", function (event) {
          event.preventDefault(); //impede o envio do formulário e a atualização da página
          const nome = document.querySelector("#nome").value; //obtém o valor do campo de texto com id nome
          alert("Olá, " + nome + "!"); //exibe um alerta com a mensagem "Olá, [nome]!"
        });
    </script>
  </body>
</html>
